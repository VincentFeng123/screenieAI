# Cross-platform release pipeline.
#
# Trigger: push a tag like `v0.2.0`. CI then runs two jobs in parallel:
#
#   1. macOS Universal — produces a single DMG containing both Apple Silicon
#      and Intel binaries.
#   2. Windows x64 — produces an NSIS `.exe` (auto-fetches WebView2 at
#      install time) and a WiX `.msi`.
#
# Both jobs attach their bundle artifacts to the same draft GitHub Release
# at github.com/<owner>/<repo>/releases. After both jobs finish, you review
# the binaries and click "Publish release" in the GitHub UI to ship.
#
# Manual trigger: Actions tab → "Publish" → Run workflow. Useful for
# checking the build end-to-end without cutting a real release; the draft
# release it produces can be deleted afterward.
#
# Code signing is optional — the workflow reads cert + notarization
# credentials from repo secrets if they exist, and produces an unsigned
# build otherwise. Unsigned macOS apps trip Gatekeeper on first launch;
# unsigned Windows apps trip SmartScreen. Users can bypass both, but for
# anything resembling a public release you'll want real certs.

name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      # Required for GITHUB_TOKEN to create / append to the release.
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            label: macOS (Universal)
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            tauri-args: --target universal-apple-darwin
          - platform: windows-latest
            label: Windows (x64)
            rust-targets: ''
            tauri-args: ''

    runs-on: ${{ matrix.platform }}
    name: Build ${{ matrix.label }}

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Install Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      # Defensive: `dtolnay/rust-toolchain` no-ops when the requested
      # toolchain is already pre-installed on the runner image, and in
      # that case it doesn't run `rustup target add` for the
      # `targets:` list either. macos-latest images now ship with only
      # `aarch64-apple-darwin` pre-installed, which silently leaves the
      # `x86_64-apple-darwin` half of the universal binary missing.
      # Explicit `target add` is idempotent and cheap — fixes the
      # missing-target failure without relying on runner image contents.
      - name: Ensure Rust cross-compile targets are installed
        if: matrix.rust-targets != ''
        shell: bash
        # Run from src-tauri/ so rustup honors the pinned channel in
        # `src-tauri/rust-toolchain.toml` (currently 1.93.1). Without
        # this, `rustup target add` would attach the targets to
        # `stable` while tauri-action later compiles with 1.93.1 — the
        # x86_64 half of the universal binary would then "vanish"
        # mid-build because it was installed on a different toolchain.
        working-directory: src-tauri
        env:
          RUST_TARGETS: ${{ matrix.rust-targets }}
        run: |
          # rustup show first forces the pinned toolchain to install
          # before we try to add targets onto it (otherwise the target
          # add fails on toolchains that aren't downloaded yet).
          rustup show active-toolchain || rustup show
          for t in ${RUST_TARGETS//,/ }; do
            rustup target add "$t"
          done

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          # Without `workspaces:`, the action caches the wrong target dir
          # because Cargo.toml is in src-tauri/, not the repo root.
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      # Export code-signing env vars ONLY when their corresponding repo
      # secrets are non-empty. `tauri-action` interprets an empty
      # `APPLE_CERTIFICATE` as "the user is trying to sign" and attempts
      # `security import` with empty cert data, which fails the build —
      # see https://github.com/tauri-apps/tauri-action/issues/... .
      # By writing the vars into $GITHUB_ENV from a shell step only when
      # they have values, builds without certs run clean (unsigned), and
      # builds with certs configured are signed automatically — no
      # workflow change needed when you eventually add the secrets.
      - name: Configure code-signing env (if certs are configured)
        shell: bash
        env:
          APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERT_PW: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID_USER: ${{ secrets.APPLE_ID }}
          APPLE_ID_PW: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM: ${{ secrets.APPLE_TEAM_ID }}
          WIN_CERT: ${{ secrets.WINDOWS_CERTIFICATE }}
          WIN_CERT_PW: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          TAURI_SIGN_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGN_KEY_PW: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -e
          # `set -e` + `[ … ] && echo` short-circuits the function to exit 1
          # when the test is false (no cert), which kills the whole step.
          # Explicit if/fi returns 0 in the no-op case.
          push() {
            if [ -n "$2" ]; then
              echo "$1=$2" >> "$GITHUB_ENV"
            fi
          }
          push APPLE_CERTIFICATE "$APPLE_CERT"
          push APPLE_CERTIFICATE_PASSWORD "$APPLE_CERT_PW"
          push APPLE_SIGNING_IDENTITY "$APPLE_IDENTITY"
          push APPLE_ID "$APPLE_ID_USER"
          push APPLE_PASSWORD "$APPLE_ID_PW"
          push APPLE_TEAM_ID "$APPLE_TEAM"
          push WINDOWS_CERTIFICATE "$WIN_CERT"
          push WINDOWS_CERTIFICATE_PASSWORD "$WIN_CERT_PW"
          push TAURI_SIGNING_PRIVATE_KEY "$TAURI_SIGN_KEY"
          push TAURI_SIGNING_PRIVATE_KEY_PASSWORD "$TAURI_SIGN_KEY_PW"

      - name: Build and publish bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signing env vars (if any) flow in via $GITHUB_ENV from the
          # step above. Don't list them here — listing an empty secret
          # as an env: value passes the empty string through and trips
          # tauri-action's signing path.
        with:
          # When triggered by a tag push, ref_name is the tag (e.g.
          # "v0.2.0"). When triggered manually via workflow_dispatch, it's
          # the branch name — the draft release will be named after the
          # branch and can be deleted after testing.
          tagName: ${{ github.ref_name }}
          releaseName: 'Screenie AI ${{ github.ref_name }}'
          releaseBody: |
            ## Downloads

            - **macOS** — `Screenie AI_*.dmg` (universal: works on both Intel and Apple Silicon)
            - **Windows** — `Screenie AI_*-setup.exe` (recommended; auto-fetches WebView2) or `*.msi` (for `winget` / enterprise deploys)

            ## Install notes

            - **macOS**: open the DMG and drag the app to Applications. If Gatekeeper warns on first launch, right-click the app → Open → confirm.
            - **Windows**: double-click the `.exe`. If SmartScreen says "Windows protected your PC", click **More info** → **Run anyway**. (This warning goes away once the build is code-signed.)

            ## Permissions Screenie AI will ask for

            - **macOS**: Screen Recording (required) and Accessibility (optional — improves Esc handling over fullscreen apps).
            - **Windows**: no system-level prompts; capture works out of the box.
          # Draft means the release is hidden from users until you flip
          # the "Publish" toggle in the GitHub UI. Both matrix jobs append
          # to the same draft release.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.tauri-args }}
